<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#e30613">
    <title>Schäfchen aktualisieren</title>
    <link rel="stylesheet" href="./styles.css?v=0.18.0">
    <script src="./refresh.js?v=0.18.0" defer></script>
  </head>
  <body>
    <main class="view login-view">
      <section class="login-card" aria-labelledby="refresh-title">
        <div class="brand brand--large">
          <img src="./assets/mark.svg" alt="" width="56" height="56">
          <div>
            <p class="eyebrow">Aktualisierung</p>
            <h1 id="refresh-title">Schäfchen wird erneuert</h1>
          </div>
        </div>
        <div class="preview-note password-change-note" role="status">
          <p>Die alte App-Oberfläche wird entfernt. Deine synchronisierten Daten und dein Konto bleiben erhalten.</p>
        </div>
      </section>
    </main>
  </body>
</html>
