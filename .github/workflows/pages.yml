name: PWA prüfen und veröffentlichen

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/PHASE1_UI_SPEC.md"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "docs/PHASE1_UI_SPEC.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  test:
    name: PWA validieren
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v7

      - name: JavaScript-Syntax prüfen
        run: |
          node --check frontend/app.js
          node --check frontend/sw.js

      - name: PWA-Smoke-Test ausführen
        run: node frontend/tests/smoke.mjs

  deploy:
    name: GitHub Pages veröffentlichen
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository laden
        uses: actions/checkout@v7

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: PWA-Artefakt hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend

      - name: PWA veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v5
